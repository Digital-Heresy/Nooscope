# Nooscope production nginx config
# WebSocket + REST proxy for Engram (Thriden) and PersonaForge

# Rate limiting for public WebSocket connections
limit_req_zone $binary_remote_addr zone=ws_public:10m rate=2r/s;

# Upstream backends — matches MindHive docker-compose service names
upstream engram-speaker {
    server engram-speaker:3030;
}

upstream engram-helix {
    server engram-helix:3030;
}

upstream forge-speaker {
    server forge-speaker:8100;
}

upstream forge-helix {
    server forge-helix:8100;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CORS headers on all responses
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Sec-WebSocket-Protocol" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;

    # Static assets with caching
    location ~* \.(js|css|png|ico|jpg|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # ---- Speaker scion ----

    # Engram WebSocket (authenticated)
    location /speaker/ws/telemetry {
        proxy_pass http://engram-speaker/ws/telemetry;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Engram WebSocket (public) — rate limited
    location /speaker/ws/telemetry/public {
        limit_req zone=ws_public burst=5 nodelay;
        proxy_pass http://engram-speaker/ws/telemetry/public;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # PF WebSocket (authenticated)
    location /speaker/ws/pf/telemetry {
        proxy_pass http://forge-speaker/ws/telemetry;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # PF WebSocket (public) — rate limited
    location /speaker/ws/pf/telemetry/public {
        limit_req zone=ws_public burst=5 nodelay;
        proxy_pass http://forge-speaker/ws/telemetry/public;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Morpheus REST API
    location /speaker/morpheus/ {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        proxy_pass http://forge-speaker/morpheus/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120;
    }

    # ---- Helix scion ----

    location /helix/ws/telemetry {
        proxy_pass http://engram-helix/ws/telemetry;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /helix/ws/telemetry/public {
        limit_req zone=ws_public burst=5 nodelay;
        proxy_pass http://engram-helix/ws/telemetry/public;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /helix/ws/pf/telemetry {
        proxy_pass http://forge-helix/ws/telemetry;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /helix/ws/pf/telemetry/public {
        limit_req zone=ws_public burst=5 nodelay;
        proxy_pass http://forge-helix/ws/telemetry/public;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /helix/morpheus/ {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        proxy_pass http://forge-helix/morpheus/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
