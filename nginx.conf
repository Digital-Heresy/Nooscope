# Nooscope production nginx config
# WebSocket proxy for Thriden + PersonaForge telemetry endpoints

# Rate limiting for public WebSocket connections
limit_req_zone $binary_remote_addr zone=ws_public:10m rate=2r/s;

# Upstream backends (adjust hostnames/ports for your Docker Compose setup)
upstream thriden {
    server thriden:3030;
}

upstream personaforge {
    server personaforge:8100;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CORS headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Sec-WebSocket-Protocol" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

    # Static assets with caching
    location ~* \.(js|css|png|ico|jpg|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Authenticated telemetry WebSocket (Thriden)
    location /ws/telemetry {
        proxy_pass http://thriden/ws/telemetry;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Public telemetry WebSocket (Thriden) — rate limited
    location /ws/telemetry/public {
        limit_req zone=ws_public burst=5 nodelay;

        proxy_pass http://thriden/ws/telemetry/public;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # PersonaForge telemetry WebSocket (authenticated)
    location /ws/pf/telemetry {
        proxy_pass http://personaforge/ws/telemetry;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # PersonaForge public telemetry WebSocket — rate limited
    location /ws/pf/telemetry/public {
        limit_req zone=ws_public burst=5 nodelay;

        proxy_pass http://personaforge/ws/telemetry/public;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
