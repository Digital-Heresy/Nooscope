<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brain Mesh Preview</title>
  <style>
    body { margin: 0; background: #0a0a1a; color: #e0e0e0; font-family: monospace; overflow: hidden; }
    #controls { position: fixed; top: 10px; left: 10px; z-index: 10; display: flex; gap: 8px; }
    #controls button { background: #1a1a3a; color: #e0e0e0; border: 1px solid #2a2a4a; padding: 8px 16px; cursor: pointer; font-family: monospace; }
    #controls button.active { background: #4a9eff; color: #000; }
    #info { position: fixed; bottom: 10px; left: 10px; z-index: 10; font-size: 12px; color: #888; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="controls">
    <span style="color:#888;font-size:12px">brain.obj — 6K faces</span>
  </div>
  <div id="info">Click a button to load. Drag to orbit, scroll to zoom.</div>

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0a0a1a);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0x404040));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    let currentMesh = null;
    let fixtures = null;

    function addFixtures() {
      if (fixtures) scene.remove(fixtures);
      fixtures = new THREE.Group();

      // Eye sockets — positioned relative to the brain's front-facing orientation
      // Brain mesh faces roughly along +Z, eyes sit forward and slightly below center
      const eyeGeom = new THREE.SphereGeometry(0.28, 12, 8);
      const eyeMat = new THREE.MeshBasicMaterial({
        color: 0x00e5ff,
        wireframe: true,
        transparent: true,
        opacity: 0.5,
      });

      // Left eye — pink (opposite blue left hemisphere)
      const leftEyeMat = new THREE.MeshBasicMaterial({
        color: 0xff4a9e, wireframe: true, transparent: true, opacity: 0.5,
      });
      const leftEye = new THREE.Mesh(eyeGeom, leftEyeMat);
      leftEye.position.set(-0.7, -1.2, 2.5);
      leftEye.name = 'eye-left';
      fixtures.add(leftEye);

      // Right eye — blue (opposite pink right hemisphere)
      const rightEyeMat = new THREE.MeshBasicMaterial({
        color: 0x4a9eff, wireframe: true, transparent: true, opacity: 0.5,
      });
      const rightEye = new THREE.Mesh(eyeGeom, rightEyeMat);
      rightEye.position.set(0.7, -1.2, 2.5);
      rightEye.name = 'eye-right';
      fixtures.add(rightEye);

      // Optic nerve lines — from eyes back into the brain (crossed, matching eye colors)
      const leftNerveMat = new THREE.LineBasicMaterial({ color: 0xff4a9e, transparent: true, opacity: 0.25 });
      const leftNerveGeom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-0.7, -1.2, 2.5),
        new THREE.Vector3(-0.3, -0.2, 1.2),
        new THREE.Vector3(-0.1, -0.1, 0.0),
      ]);
      fixtures.add(new THREE.Line(leftNerveGeom, leftNerveMat));

      const rightNerveMat = new THREE.LineBasicMaterial({ color: 0x4a9eff, transparent: true, opacity: 0.25 });
      const rightNerveGeom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0.7, -1.2, 2.5),
        new THREE.Vector3(0.3, -0.2, 1.2),
        new THREE.Vector3(0.1, -0.1, 0.0),
      ]);
      fixtures.add(new THREE.Line(rightNerveGeom, rightNerveMat));

      scene.add(fixtures);
    }

    window._loadBrain = function(url, btn) {
      document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('info').textContent = 'Loading...';

      if (currentMesh) {
        scene.remove(currentMesh);
        currentMesh = null;
      }

      const loader = new OBJLoader();
      loader.load(url, (obj) => {
        let totalVerts = 0, totalFaces = 0;

        obj.traverse((child) => {
          if (child.isMesh) {
            child.material = new THREE.MeshBasicMaterial({
              color: child.name?.includes('rh') ? 0xff4a9e : 0x4a9eff,
              wireframe: true,
              transparent: true,
              opacity: 0.4,
            });
            totalVerts += child.geometry.attributes.position.count;
            totalFaces += child.geometry.index
              ? child.geometry.index.count / 3
              : child.geometry.attributes.position.count / 3;
          }
        });

        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        obj.position.sub(center);

        scene.add(obj);
        currentMesh = obj;

        // Add eye fixtures relative to the centered brain
        addFixtures();

        document.getElementById('info').textContent =
          `${Math.round(totalVerts)} verts, ${Math.round(totalFaces)} faces — ` +
          `Pink = right hemisphere, Blue = left hemisphere`;
      },
      (progress) => {
        if (progress.total) {
          const pct = Math.round(progress.loaded / progress.total * 100);
          document.getElementById('info').textContent = `Loading... ${pct}%`;
        }
      },
      (err) => {
        document.getElementById('info').textContent = `Error: ${err.message}`;
        console.error(err);
      });
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Click to inspect vertices
    const raycaster = new THREE.Raycaster();
    raycaster.params.Points = { threshold: 0.1 };
    const mouse = new THREE.Vector2();
    let marker = null;

    renderer.domElement.addEventListener('click', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      if (!currentMesh) return;
      const intersects = raycaster.intersectObject(currentMesh, true);
      if (intersects.length > 0) {
        const pt = intersects[0].point;
        console.log(`Clicked vertex near: x=${pt.x.toFixed(3)}, y=${pt.y.toFixed(3)}, z=${pt.z.toFixed(3)}`);
        document.getElementById('info').textContent =
          `Vertex: x=${pt.x.toFixed(3)}, y=${pt.y.toFixed(3)}, z=${pt.z.toFixed(3)}`;

        // Drop a marker sphere
        if (marker) scene.remove(marker);
        marker = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        marker.position.copy(pt);
        scene.add(marker);
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Auto-load
    window._loadBrain('models/brain.obj', document.querySelector('#controls span'));
    document.getElementById('info').textContent = 'Loading brain...';
  </script>
</body>
</html>
