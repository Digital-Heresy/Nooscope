<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nooscope — Dreams</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dreams.css">
</head>
<body class="dreams-page">

  <!-- Status bar -->
  <div id="status-bar">
    <div class="status-left">
      <span class="logo">Nooscope</span>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Activity</a>
        <a href="dreams.html" class="nav-link active">Dreams</a>
        <a href="social.html" class="nav-link">Social</a>
        <a href="logs.html" class="nav-link">Logs</a>
      </nav>
      <select id="scion-select">
        <option value="custom">Custom...</option>
      </select>
      <button id="connect-btn">Connect</button>
    </div>
    <div class="status-right">
      <span id="mode-badge" class="mode-badge public">PUBLIC</span>
      <button id="admin-toggle-btn" class="admin-btn" title="Admin login">&#128274;</button>
      <span id="credits-display" class="stat hidden" data-admin-only></span>
      <span id="pf-status" class="status-indicator disconnected">PF</span>
      <span id="dream-count" class="stat">—</span>
    </div>
  </div>

  <!-- Custom connection dialog -->
  <div id="custom-dialog" class="hidden">
    <label>PF port: <input id="custom-pf" type="number" value="8100"></label>
    <button id="custom-connect-btn">Connect</button>
  </div>

  <!-- Admin login modal is installed by js/auth.js (Nooscope-r5kh) -->


  <!-- Main content -->
  <div id="dreams-container">

    <!-- SOUL-in-Git notice: shown when the connected Scion's SOUL isn't
         managed in a Git repo yet (dream proposals can't become PRs).
         Populated + toggled by js/dreams.js on connect. -->
    <div id="soul-repo-warning" class="hidden"></div>

    <!-- Left: dream timeline -->
    <div id="dream-timeline">
      <div class="panel-header">
        <span>Dream Timeline</span>
        <button id="refresh-btn" title="Refresh">&#8635;</button>
      </div>
      <div id="dream-list"></div>
    </div>

    <!-- Right: dream detail -->
    <div id="dream-detail">
      <div id="detail-empty" class="empty-state">
        <p>Select a dream from the timeline</p>
      </div>
      <div id="detail-header" class="hidden"></div>
      <div id="storyboard-strip" class="hidden"></div>
      <div id="dream-meta" class="hidden"></div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dreams.js"></script>
</body>
</html>
