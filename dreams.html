<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nooscope — Dreams</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dreams.css">
</head>
<body class="dreams-page">

  <!-- Status bar -->
  <div id="status-bar">
    <div class="status-left">
      <span class="logo">Nooscope</span>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Activity</a>
        <a href="dreams.html" class="nav-link active">Dreams</a>
      </nav>
      <select id="scion-select">
        <option value="custom">Custom...</option>
      </select>
      <button id="connect-btn">Connect</button>
    </div>
    <div class="status-right">
      <span id="credits-display" class="stat hidden"></span>
      <span id="pf-status" class="status-indicator disconnected">PF</span>
      <span id="dream-count" class="stat">—</span>
    </div>
  </div>

  <!-- Custom connection dialog -->
  <div id="custom-dialog" class="hidden">
    <label>PF port: <input id="custom-pf" type="number" value="8100"></label>
    <label>Token: <input id="custom-token" type="password" placeholder="morpheus_token"></label>
    <button id="custom-connect-btn">Connect</button>
  </div>

  <!-- Token dialog (for named scions) -->
  <div id="token-dialog" class="hidden">
    <div class="token-dialog-inner">
      <div class="panel-header">
        <span>Morpheus Token</span>
        <button id="token-dialog-close">&times;</button>
      </div>
      <div class="token-dialog-body">
        <p>Enter your Morpheus token to access dream data.</p>
        <label>Token: <input id="token-input" type="password" placeholder="morpheus_token"></label>
        <button id="token-save-btn">Save &amp; Connect</button>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div id="dreams-container">

    <!-- Left: dream timeline -->
    <div id="dream-timeline">
      <div class="panel-header">
        <span>Dream Timeline</span>
        <button id="refresh-btn" title="Refresh">&#8635;</button>
      </div>
      <div id="dream-list"></div>
    </div>

    <!-- Right: dream detail -->
    <div id="dream-detail">
      <div id="detail-empty" class="empty-state">
        <p>Select a dream from the timeline</p>
      </div>
      <div id="detail-header" class="hidden"></div>
      <div id="storyboard-strip" class="hidden"></div>
      <div id="dream-meta" class="hidden"></div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/dreams.js"></script>
</body>
</html>
