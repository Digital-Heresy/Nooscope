# Nooscope main nginx config (Nooscope-hm4c).
#
# This replaces the stock nginxinc/nginx-unprivileged:alpine /etc/nginx/nginx.conf
# for ONE reason: `load_module` is only valid in the main context, and the admin
# session auth (njs HMAC verify, see njs/nooscope-auth.js) needs the JavaScript
# module loaded before the http{} block. Everything else mirrors the upstream
# unprivileged default — the unprivileged temp paths under /tmp, pid in /tmp,
# and the conf.d include that pulls in our generated default.conf. Keep this in
# sync with the base image's nginx.conf if it changes (it rarely does).
#
# The js_import / js_set / per-Scion maps live in conf.d/default.conf (http
# context, included below), NOT here — only load_module must be main-context.

load_module /usr/lib/nginx/modules/ngx_http_js_module.so;

worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;


events {
    worker_connections  1024;
}


http {
    proxy_temp_path /tmp/proxy_temp;
    client_body_temp_path /tmp/client_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;
}
